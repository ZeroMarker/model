name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install Blender
      run: |
        sudo apt-get update
        sudo apt-get install -y blender python3-numpy
    
    - name: Install numpy for Blender
      run: |
        # Find Blender's Python and install numpy
        BLENDER_PYTHON=$(blender --background --python-expr "import sys; print(sys.executable)" 2>/dev/null | grep -oP '/[^\s]+python[^\s]*')
        echo "Blender Python: $BLENDER_PYTHON"
        # Install numpy using pip
        pip3 install numpy --target="/usr/share/blender/scripts/modules" 2>/dev/null || true
        # Alternative: symlink system numpy
        PYTHON_VERSION=$(blender --background --python-expr "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" 2>/dev/null | grep -oP '\d+\.\d+$')
        sudo ln -sf /usr/lib/python3/dist-packages/numpy /usr/share/blender/$PYTHON_VERSION/python/lib/python$PYTHON_VERSION/site-packages/ 2>/dev/null || true
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Create site directory
      run: mkdir -p site/models site/renders
    
    - name: Generate model files for web
      run: |
        cat > generate_web_models.py << 'EOF'
        import bpy
        import os
        
        # Generate Tiananmen
        print("Generating Tiananmen model...")
        exec(open("blender/create_tiananmen.py").read())
        bpy.ops.export_scene.gltf(
            filepath="site/models/tiananmen.glb",
            export_format='GLB',
            use_selection=False,
            export_apply=True
        )
        
        # Clear scene
        bpy.ops.object.select_all(action='SELECT')
        bpy.ops.object.delete()
        
        # Generate Maodie Cat (Detail version)
        print("Generating Maodie Cat model (detail)...")
        exec(open("blender/maodie_cat_detail.py").read())
        bpy.ops.export_scene.gltf(
            filepath="site/models/maodie_cat.glb",
            export_format='GLB',
            use_selection=False,
            export_apply=True
        )
        
        print("Web models generated!")
        EOF
        blender --background --python generate_web_models.py
    
    - name: Install FreeCAD
      run: |
        wget -q https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -O miniforge.sh
        bash miniforge.sh -b -p $HOME/miniforge
        export PATH="$HOME/miniforge/bin:$PATH"
        echo "PATH=$HOME/miniforge/bin:$PATH" >> $GITHUB_ENV
        conda install -y -c conda-forge freecad
    
    - name: Generate FreeCAD models
      run: |
        export PATH="$HOME/miniforge/bin:$PATH"
        cd freecad
        freecadcmd iron_cross.py 2>&1 || echo "Iron cross generation completed"
        freecadcmd medal_of_republic_simple.py 2>&1 || echo "Medal generation completed"
        cd ..
    
    - name: Convert STL to GLB
      run: |
        cat > convert_stl_to_glb.py << 'EOF'
        import bpy
        import os
        
        # Convert Iron Cross
        print("Converting Iron Cross...")
        bpy.ops.import_mesh.stl(filepath="freecad/iron_cross.stl")
        bpy.ops.export_scene.gltf(
            filepath="site/models/iron_cross.glb",
            export_format='GLB',
            use_selection=False,
            export_apply=True
        )
        
        # Clear scene
        bpy.ops.object.select_all(action='SELECT')
        bpy.ops.object.delete()
        
        # Convert Medal of Republic
        print("Converting Medal of Republic...")
        if os.path.exists("freecad/medal_of_republic_simple.stl"):
            bpy.ops.import_mesh.stl(filepath="freecad/medal_of_republic_simple.stl")
        elif os.path.exists("freecad/medal_of_republic.stl"):
            bpy.ops.import_mesh.stl(filepath="freecad/medal_of_republic.stl")
        bpy.ops.export_scene.gltf(
            filepath="site/models/medal_of_republic.glb",
            export_format='GLB',
            use_selection=False,
            export_apply=True
        )
        
        print("Conversion completed!")
        EOF
        blender --background --python convert_stl_to_glb.py
    
    - name: Create index.html
      run: |
        cat > site/index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>3D模型展示</title>
            <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { 
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    min-height: 100vh;
                    padding: 2rem;
                }
                h1 { 
                    text-align: center; 
                    color: white; 
                    margin-bottom: 2rem;
                    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
                }
                .container {
                    max-width: 1200px;
                    margin: 0 auto;
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
                    gap: 2rem;
                }
                .model-card {
                    background: white;
                    border-radius: 16px;
                    overflow: hidden;
                    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                }
                .model-viewer {
                    width: 100%;
                    height: 400px;
                    background: #f0f0f0;
                }
                .model-info {
                    padding: 1.5rem;
                }
                .model-info h2 {
                    color: #333;
                    margin-bottom: 0.5rem;
                }
                .model-info p {
                    color: #666;
                    line-height: 1.6;
                }
                .tags {
                    display: flex;
                    gap: 0.5rem;
                    margin-top: 1rem;
                    flex-wrap: wrap;
                }
                .tag {
                    background: #e0e7ff;
                    color: #4338ca;
                    padding: 0.25rem 0.75rem;
                    border-radius: 20px;
                    font-size: 0.85rem;
                }
                .stl-viewer {
                    width: 100%;
                    height: 400px;
                    background: #f0f0f0;
                    cursor: grab;
                }
                .stl-viewer:active {
                    cursor: grabbing;
                }
                footer {
                    text-align: center;
                    color: white;
                    margin-top: 3rem;
                    opacity: 0.8;
                }
            </style>
        </head>
        <body>
            <h1>3D模型展示</h1>
            <div class="container">
                <div class="model-card">
                    <model-viewer 
                        class="model-viewer"
                        src="models/tiananmen.glb" 
                        alt="天安门城楼"
                        auto-rotate 
                        camera-controls
                        shadow-intensity="1">
                    </model-viewer>
                    <div class="model-info">
                        <h2>天安门城楼</h2>
                        <p>中国标志性建筑，采用重檐歇山顶设计，包含城墙、城楼、华表、金水桥等元素。</p>
                        <div class="tags">
                            <span class="tag">建筑</span>
                            <span class="tag">中国风</span>
                            <span class="tag">硬表面</span>
                        </div>
                    </div>
                </div>
                <div class="model-card">
                    <model-viewer 
                        class="model-viewer"
                        src="models/maodie_cat.glb" 
                        alt="圆头耄耋橘猫"
                        auto-rotate 
                        camera-controls
                        shadow-intensity="1">
                    </model-viewer>
                    <div class="model-info">
                        <h2>圆头耄耋（橘猫）</h2>
                        <p>网络热梗角色，精细化模型包含：圆头脸颊、飞机耳、哈气露齿、竖瞳、泪痕、虎斑纹路、毛发质感等细节。</p>
                        <div class="tags">
                            <span class="tag">角色</span>
                            <span class="tag">动物</span>
                            <span class="tag">网络热梗</span>
                            <span class="tag">精细化</span>
                        </div>
                    </div>
                </div>
                <div class="model-card">
                    <model-viewer 
                        class="model-viewer"
                        src="models/iron_cross.glb" 
                        alt="铁十字勋章"
                        auto-rotate 
                        camera-controls
                        shadow-intensity="1">
                    </model-viewer>
                    <div class="model-info">
                        <h2>铁十字勋章</h2>
                        <p>经典普鲁士/德国军事勋章复刻，FreeCAD参数化建模。十字形设计，凸起边框，中心圆环装饰。</p>
                        <div class="tags">
                            <span class="tag">CAD</span>
                            <span class="tag">FreeCAD</span>
                            <span class="tag">军事</span>
                            <span class="tag">参数化</span>
                        </div>
                    </div>
                </div>
                <div class="model-card">
                    <model-viewer 
                        class="model-viewer"
                        src="models/medal_of_republic.glb" 
                        alt="共和国勋章"
                        auto-rotate 
                        camera-controls
                        shadow-intensity="1">
                    </model-viewer>
                    <div class="model-info">
                        <h2>共和国勋章</h2>
                        <p>中华人民共和国最高荣誉勋章复刻，五角星设计，中心天安门图案，麦穗装饰，挂环连接。</p>
                        <div class="tags">
                            <span class="tag">CAD</span>
                            <span class="tag">FreeCAD</span>
                            <span class="tag">荣誉</span>
                            <span class="tag">中国</span>
                        </div>
                    </div>
                </div>
            </div>
            <footer>
                <p>使用 Blender & FreeCAD Python API 程序化生成 | Powered by GitHub Pages</p>
            </footer>
        </body>
        </html>
        HTMLEOF
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Build with Jekyll
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./site
        destination: ./_site
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

name: FreeCAD Models

on:
  push:
    branches: [ main ]
    paths:
      - 'freecad/*.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install FreeCAD via Conda
      run: |
        # Install conda
        wget -q https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -O miniforge.sh
        bash miniforge.sh -b -p $HOME/miniforge
        export PATH="$HOME/miniforge/bin:$PATH"
        echo "PATH=$HOME/miniforge/bin:$PATH" >> $GITHUB_ENV
        
        # Install FreeCAD
        conda install -y -c conda-forge freecad
    
    - name: Verify FreeCAD installation
      run: |
        export PATH="$HOME/miniforge/bin:$PATH"
        which freecadcmd || which freecad || echo "Finding FreeCAD..."
        freecadcmd --version 2>&1 || echo "FreeCAD installed"
    
    - name: Create output directory
      run: mkdir -p output
    
    - name: Run FreeCAD scripts
      run: |
        export PATH="$HOME/miniforge/bin:$PATH"
        for script in freecad/*.py; do
          if [ -f "$script" ]; then
            echo "Running: $script"
            freecadcmd "$script" 2>&1 || echo "Failed: $script"
          fi
        done
    
    - name: Move output files
      run: |
        # Move generated files to output directory
        find freecad -name "*.step" -o -name "*.stl" -o -name "*.iges" 2>/dev/null | while read f; do
          mv "$f" output/ 2>/dev/null || true
        done
        ls -la output/ 2>/dev/null || echo "No files moved"
    
    - name: List output files
      run: ls -la output/ || echo "No output files generated"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: freecad-models
        path: output/
        retention-days: 90
